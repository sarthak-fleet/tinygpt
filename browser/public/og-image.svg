<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d0e10"/>
      <stop offset="100%" stop-color="#08090a"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="0%" r="70%">
      <stop offset="0%" stop-color="#48e5c2" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#48e5c2" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e7e8ea"/>
      <stop offset="100%" stop-color="#48e5c2"/>
    </linearGradient>
    <linearGradient id="loss-fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#48e5c2" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#48e5c2" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Brand mark, large, top-left -->
  <g transform="translate(72, 72)">
    <rect width="72" height="72" rx="16" fill="#0d0e10"/>
    <rect x="1" y="1" width="70" height="70" rx="15" fill="none" stroke="#48e5c2" stroke-opacity="0.4"/>
    <path d="M 11 16 C 21 16 25 47 39 54 C 48 58 52 58 61 58"
          fill="none" stroke="#48e5c2" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="61" cy="58" r="5.5" fill="#48e5c2"/>
    <circle cx="61" cy="58" r="12" fill="#48e5c2" fill-opacity="0.18"/>
  </g>

  <!-- Title -->
  <text x="72" y="220" font-family="Geist, system-ui, -apple-system, sans-serif"
        font-size="92" font-weight="600" letter-spacing="-3" fill="url(#title)">TinyGPT</text>

  <!-- Subtitle -->
  <text x="72" y="276" font-family="Geist, system-ui, sans-serif"
        font-size="28" font-weight="400" fill="#9296a0">
    Train a real transformer from scratch in your browser tab
  </text>

  <!-- Stats row -->
  <g transform="translate(72, 360)">
    <!-- Stat 1 -->
    <text x="0" y="0" font-family="Geist Mono, ui-monospace, monospace" font-size="13" letter-spacing="2" fill="#787d88">PARAMETERS</text>
    <text x="0" y="50" font-family="Geist Mono, ui-monospace, monospace" font-size="42" font-weight="500" fill="#e7e8ea" letter-spacing="-1">0.8M – 25M</text>

    <!-- Divider -->
    <line x1="270" y1="-12" x2="270" y2="64" stroke="#1d1f23"/>

    <!-- Stat 2 -->
    <text x="300" y="0" font-family="Geist Mono, ui-monospace, monospace" font-size="13" letter-spacing="2" fill="#787d88">BACKENDS</text>
    <text x="300" y="50" font-family="Geist Mono, ui-monospace, monospace" font-size="42" font-weight="500" fill="#e7e8ea" letter-spacing="-1">WASM · WebGPU</text>

    <!-- Divider -->
    <line x1="650" y1="-12" x2="650" y2="64" stroke="#1d1f23"/>

    <!-- Stat 3 -->
    <text x="680" y="0" font-family="Geist Mono, ui-monospace, monospace" font-size="13" letter-spacing="2" fill="#787d88">SPEEDUP</text>
    <text x="680" y="50" font-family="Geist Mono, ui-monospace, monospace" font-size="42" font-weight="500" fill="#48e5c2" letter-spacing="-1">7× GPU · 2× threads</text>
  </g>

  <!-- Decorative loss curve in lower right -->
  <g transform="translate(640, 460)">
    <!-- Filled area -->
    <path d="M 0 30 C 60 30, 90 110, 180 140 C 280 168, 360 168, 480 168 L 480 175 L 0 175 Z" fill="url(#loss-fill)"/>
    <!-- Line -->
    <path d="M 0 30 C 60 30, 90 110, 180 140 C 280 168, 360 168, 480 168"
          fill="none" stroke="#48e5c2" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Leading edge dot -->
    <circle cx="480" cy="168" r="9" fill="#48e5c2" fill-opacity="0.22"/>
    <circle cx="480" cy="168" r="4" fill="#48e5c2"/>
    <!-- Annotations -->
    <text x="0" y="20" font-family="Geist Mono, monospace" font-size="14" fill="#787d88">loss 5.55 (random)</text>
    <text x="430" y="155" font-family="Geist Mono, monospace" font-size="14" fill="#48e5c2" text-anchor="end">loss 1.0</text>
  </g>

  <!-- Footer URL -->
  <text x="72" y="585" font-family="Geist Mono, ui-monospace, monospace"
        font-size="20" font-weight="500" fill="#787d88">tinygpt.sarthakagrawal.dev</text>

  <!-- Bottom-right tag -->
  <g transform="translate(1080, 558)">
    <rect x="-86" y="0" width="86" height="32" rx="16" fill="none" stroke="#1d1f23"/>
    <text x="-43" y="22" font-family="Geist Mono, monospace" font-size="13"
          font-weight="500" letter-spacing="1" fill="#787d88" text-anchor="middle">HAND-WRITTEN</text>
  </g>
</svg>
