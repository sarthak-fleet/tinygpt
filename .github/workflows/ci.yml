# Continuous integration — build + test gate on every push and PR.
#
# Two parallel jobs:
#   browser  (Ubuntu — cheap)         tsc + astro production build
#   mac      (macOS — has Xcode)      swift build + xcodebuild test-Package
#
# What this catches that local development misses:
#   - Backtick / template-literal parse errors in HTML comments
#     (the astro build catches what `tsc --noEmit` doesn't).
#   - Drift between code and the package's checked-in lockfiles.
#   - Swift code that compiles for one architecture but not another.
#   - Tests that pass on dev's machine because of stale cache state.
#
# Triggered on:
#   - push to main (validates the head)
#   - pull_request (gates merges)

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel earlier in-flight runs on the same PR/branch — we only care
# about the latest commit's verdict.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  browser:
    name: browser (tsc + astro build)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: browser/package-lock.json

      - name: Install dependencies
        working-directory: browser
        run: npm ci

      - name: Type-check (tsc --noEmit)
        working-directory: browser
        run: npm run typecheck

      - name: Production build (copy_docs + tsc + astro build)
        working-directory: browser
        # Same env as deploy.yml — VITE_* vars get inlined; falling back
        # to empty just disables analytics, doesn't break the build.
        env:
          VITE_POSTHOG_KEY: ""
          VITE_POSTHOG_HOST: ""
        run: npm run build

  mac:
    name: mac (swift build + xcodebuild test)
    # macos-15 has Xcode 16 with the Swift / Metal toolchains the
    # MLX-Swift package needs. Older macos-13 images don't.
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Swift + Xcode versions
        run: |
          swift --version
          xcodebuild -version

      - name: Resolve SwiftPM dependencies
        working-directory: native-mac
        run: swift package resolve

      - name: Swift build (debug)
        working-directory: native-mac
        # `swift build` doesn't bundle the Metal library that MLX needs at
        # RUNTIME — but it DOES catch every Swift compile error. We rely
        # on the separate `xcodebuild test` step below for runtime checks.
        run: swift build

      - name: Run unit tests (xcodebuild on TinyGPT-Package)
        working-directory: native-mac
        # `xcodebuild test` produces a bundle with the Metal lib included,
        # so the Mac unit tests can actually run. -destination platform=macOS
        # uses the runner host directly (no simulator needed).
        run: |
          xcodebuild test \
            -scheme TinyGPT-Package \
            -destination 'platform=macOS' \
            -resultBundlePath /tmp/test-result.xcresult \
          | xcbeautify --renderer github-actions || \
          xcodebuild test \
            -scheme TinyGPT-Package \
            -destination 'platform=macOS' \
            -resultBundlePath /tmp/test-result.xcresult

      - name: Upload test result bundle on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: mac-test-result
          path: /tmp/test-result.xcresult
          retention-days: 7
